mutation NewUser($input: NewUserMutationInput!) {
  newUser(input: $input) {
    errors {
      messages
    }
    users {
      id
    }
  }
}

mutation UpdateUser($input: UpdateUserMutationInput!) {
  updateUser(input: $input) {
    errors {
      messages
    }
    users {
      id
    }
  }
}

