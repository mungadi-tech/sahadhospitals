mutation InboxMutation($input: InboxMutationInput!) {
  createInbox(input: $input) {
    errors {
      messages
    }
    inbox {
      id
    }
  }
}

mutation AppointmentMutation($input: AppointmentMutationInput!) {
  createAppointment(input: $input) {
    errors {
      messages
    }
    appointment {
      id
    }
  }
}
